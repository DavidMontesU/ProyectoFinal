<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Especialidad</title>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-lg-3 col-md-3 col-sm-3"></div>
        <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
            <h4>Formulario de Actualización de Especialidad</h4>
            <hr>
            
            <form th:action="@{/ServletEspecialidad}" method="post">
                <input type="hidden" name="type" value="editar">
                
                <input type="hidden" name="codEsp" th:value="${especialidadDataEdit?.codEsp}">
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Código</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtCodEsp" readonly 
                               th:value="${especialidadDataEdit?.codEsp}" 
                               style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Descripción</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtDescripcion" 
                               th:value="${especialidadDataEdit?.descripcion}" 
                               style="width: 100%">
                    </div>
                </div><br>
                
                <div class="col-6 col-sm-7">
                    <input type="submit" class="btn btn-primary" value="Editar especialidad">
                    <a th:href="@{/ServletEspecialidad(type='listar')}" class="btn btn-primary">Regresar</a>
                </div>
            </form>
            
        </div>
    </div>
</div>
</body>
</html>
