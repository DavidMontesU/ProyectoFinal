<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Especialidad</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
            <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
                <h4>Formulario de Registro de Especialidad</h4>
                <hr>
                
                <form th:action="@{/especialidad/registrar}" th:object="${especialidadDataEdit}" method="post">
                    
                    <div class="form-group row">
                        <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Código</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" th:field="*{codEsp}" style="width: 100%">
                        </div>
                    </div>
                    
                    <div class="form-group row">
                        <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Descripción</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" th:field="*{descripcion}" style="width: 100%">
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="form-group row">
                        <div class="col-lg-3 col-md-3 col-sm-3">
                            <input type="submit" class="btn btn-success" value="Registrar">
                        </div>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <a th:href="@{/especialidad/lista}" class="btn btn-primary">Regresar</a>
                        </div>
                    </div>
                </form>
                <br>
            </div>
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
        </div>
    </div>
</body>
</html>
