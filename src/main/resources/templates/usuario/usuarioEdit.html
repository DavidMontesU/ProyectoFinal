<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-lg-3 col-md-3 col-sm-3"></div>
        <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
            <h4>Formulario de Actualización de Usuario</h4>
            <hr>
            
            <form th:action="@{/usuario/registrar}" th:object="${usuarioDataEdit}" method="post">
                <input type="hidden" name="type" value="editar">
                
                <input type="hidden" th:field="*{idUsuario}">
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Username</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" th:field="*{username}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Clave</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="password" th:field="*{clave}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Tipo Usuario</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <select th:field="*{idTipo}" style="width: 100%">
                            <option value="">Seleccione un tipo</option>
                            
                            <option th:each="item : ${dataTipoUsuario}" 
                                    th:value="${item.idTipo}" 
                                    th:text="${item.descripcion}">
                            </option>
                            
                        </select>
                    </div>
                </div><br>
                
                <div class="col-6 col-sm-7">
                    <input type="submit" class="btn btn-primary" value="Editar usuario">
                    <a th:href="@{/usuario/lista}" class="btn btn-primary">Regresar</a>
                </div>
            </form>
            
        </div>
    </div>
</div>
</body>
</html>
