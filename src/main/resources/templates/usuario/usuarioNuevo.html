<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuario</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
            <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
                <h4>Formulario de Registro de Usuario</h4>
                <hr>
                
                <form th:action="@{/ServletUsuario}" method="post">
                    <input type="hidden" name="type" value="registrar">
                    
                    <div class="form-group row">
                        <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Username</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" name="txtUsername" style="width: 100%">
                        </div>
                    </div>
                    
                    <div class="form-group row">
                        <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Clave</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="password" name="txtClave" style="width: 100%">
                        </div>
                    </div>
                    
                    <div class="form-group row">
                        <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Tipo Usuario</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <select name="cboTipoUsuario" style="width: 100%">
                                <option value="">Seleccione un tipo</option>
                                
                                <option th:each="item : ${dataTipoUsuario}" 
                                        th:value="${item.idTipo}" 
                                        th:text="${item.descripcion}">
                                </option>
                                
                            </select>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="form-group row">
                        <div class="col-lg-3 col-md-3 col-sm-3">
                            <input type="submit" class="btn btn-success" value="Registrar">
                        </div>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <a th:href="@{/ServletUsuario(type='listar')}" class="btn btn-primary">Regresar</a>
                        </div>
                    </div>
                </form>
                <br>
            </div>
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
        </div>
    </div>
</body>
</html>
