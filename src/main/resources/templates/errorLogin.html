<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clínica Veterinaria - Error Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #E8F5E9;">
<br>
<div class="container-fluid">
    <div class="row">
        <div class="col-lg-3"></div>
        <div class="col-lg-6 text-center">
            
            <div class="alert alert-danger" role="alert">
                <h4 class="alert-heading">¡Acceso Denegado!</h4>
                <p>Las credenciales ingresadas son incorrectas.</p>
                <hr>
                <p class="mb-0">Por favor, verifique su usuario y contraseña.</p>
            </div>
            
            <a th:href="@{/login}" class="btn btn-primary">
                <i class="bi bi-arrow-left"></i> Regresar al Login
            </a>
            
        </div>
        <div class="col-lg-3"></div>
    </div>
</div>
</body>
</html>
