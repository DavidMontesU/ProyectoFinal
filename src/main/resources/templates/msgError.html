<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Clínica Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        .error-icon {
            font-size: 5rem;
            color: #D32F2F;
        }
    </style>
</head>
<body style="background-color: #E8F5E9;">
<br>
<div class="container-fluid">
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">⚠️</div>
            <h2 class="text-danger mt-3">¡Error en la Operación!</h2>
            
            <p class="lead mt-3">
                <span th:text="${session.mensaje ?: mensaje ?: 'Ocurrió un error inesperado en el sistema.'}"></span>
            </p>
            
            <p class="text-muted">
                Por favor, consulte con el administrador del sistema.
            </p>
            <hr class="my-4">
            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                
                <a th:href="@{/home}" class="btn btn-primary">
                    🏠 Ir al Inicio
                </a>
                
                <button onclick="history.back()" class="btn btn-secondary">
                    ⬅️ Volver Atrás
                </button>
                
            </div>
        </div>
    </div>
</div>
</body>
</html>
