<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cliente</title>
    
    <link rel="stylesheet" th:href="@{/css/estilos-botones.css}" />
<link rel="stylesheet" th:href="@{/css/estilos-generales.css}" />
<link rel="stylesheet" th:href="@{/css/estilos-tabla.css}" />
<link rel="stylesheet" th:href="@{/css/formulario.css}" />


    <style>
        label.error {
            color: red;
            font-size: 1rem;
            display: block;
            margin-top: 5px;
        }
        input.error, textarea.error {
            border: 1px dashed red;
            font-weight: 300;
            color: red;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.0/jquery.validate.min.js"></script>
    <script type="text/javascript">
        $(document).ready(function() {
            $("form[name='frmNuevo']").validate({
                rules: {
                    dni: { required: true, minlength: 8, maxlength: 8},
                    nombreCliente: { required: true, minlength: 3},
                    apellidoCliente: { required: true, minlength: 3},
                    telefono: { required: true, minlength: 7},
                    direccion: { required: true, minlength: 5},
                    correo: { required: true, email: true}
                },
                messages: {
                    dni: {
                        required: "Ingrese DNI del cliente",
                        minlength: "El DNI debe tener 8 dígitos",
                        maxlength: "El DNI debe tener 8 dígitos"
                    },
                    nombreCliente: {
                        required: "Ingrese nombre del cliente",
                        minlength: "El nombre debe contener al menos 3 caracteres"
                    },
                    apellidoCliente: {
                        required: "Ingrese apellido del cliente",
                        minlength: "El apellido debe contener al menos 3 caracteres"
                    },
                    telefono: {
                        required: "Ingrese telefono del cliente",
                        minlength: "El telefono debe contener al menos 7 caracteres"
                    },
                    direccion: {
                        required: "Ingrese direccion del cliente",
                        minlength: "La direccion debe contener al menos 5 caracteres"
                    },
                    correo: {
                        required: "Ingrese correo del cliente",
                        email: "Ingrese un correo válido"
                    }
                }
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
            <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
                <h4>Formulario de Registro de Cliente</h4>
                <hr>
                
                <form th:action="@{/clientes/registrar}" th:object="${clienteDataEdit}" method="post" name="frmNuevo">
                    
                    <div class="form-group row">
                        <label for="dni" class="col-lg-3 col-md-3 col-sm-3 col-form-label">DNI</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" th:field="*{dni}" style="width: 100%">
                        </div>
                    </div>
                    
                    <div class="form-group row">
                        <label for="nombreCliente" class="col-lg-3 col-md-3 col-sm-3 col-form-label">Nombre</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" th:field="*{nombreCliente}" style="width: 100%">
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="apellidoCliente" class="col-lg-3 col-md-3 col-sm-3 col-form-label">Apellido</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" th:field="*{apellidoCliente}" style="width: 100%">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="telefono" class="col-lg-3 col-md-3 col-sm-3 col-form-label">Teléfono</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" th:field="*{telefono}" style="width: 100%">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="direccion" class="col-lg-3 col-md-3 col-sm-3 col-form-label">Dirección</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" th:field="*{direccion}" style="width: 100%">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="correo" class="col-lg-3 col-md-3 col-sm-3 col-form-label">Correo</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="email" th:field="*{correo}" style="width: 100%">
                        </div>
                    </div>

                    <hr>
                    
                    <div class="form-group row">
                        <div class="col-lg-3 col-md-3 col-sm-3">
                            <input type="submit" class="btn btn-success" value="Registrar">
                        </div>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <a th:href="@{/clientes/lista}" class="btn btn-primary">Regresar</a>
                        </div>
                    </div>
                </form>
                <br>
            </div>
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
        </div>
    </div>
</body>
</html>
