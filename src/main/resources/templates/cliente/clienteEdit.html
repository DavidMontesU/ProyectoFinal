<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>
    
    <link rel="stylesheet" th:href="@{/css/estilos-botones.css}" />
<link rel="stylesheet" th:href="@{/css/estilos-generales.css}" />
<link rel="stylesheet" th:href="@{/css/estilos-tabla.css}" />
<link rel="stylesheet" th:href="@{/css/formulario.css}" />


</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-lg-3 col-md-3 col-sm-3"></div>
        <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
            <h4>Formulario de Actualización de Cliente</h4>
            <hr>
            
            <form th:action="@{/ServletCliente}" method="post">
                <input type="hidden" name="type" value="editar">
                
                <input type="hidden" name="idCliente" th:value="${clienteDataEdit?.idCliente}">
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">DNI</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtDni" th:value="${clienteDataEdit?.dni}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Nombre</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtNombre" th:value="${clienteDataEdit?.nombreCliente}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Apellido</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtApellido" th:value="${clienteDataEdit?.apellidoCliente}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Teléfono</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtTelefono" th:value="${clienteDataEdit?.telefono}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Dirección</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtDireccion" th:value="${clienteDataEdit?.direccion}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Correo</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtCorreo" th:value="${clienteDataEdit?.correo}" style="width: 100%">
                    </div>
                </div><br>
                
                <div class="col-6 col-sm-7">
                    <input type="submit" class="btn btn-primary" value="Editar cliente">
                    <a th:href="@{/ServletCliente(type='listar')}" class="btn btn-primary">Regresar</a>
                </div>
            </form>
            
        </div>
    </div>
</div>
</body>
</html>
