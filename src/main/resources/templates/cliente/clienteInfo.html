<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Cliente</title>
    
    <link rel="stylesheet" th:href="@{/css/estilos-botones.css}" />
<link rel="stylesheet" th:href="@{/css/estilos-generales.css}" />
<link rel="stylesheet" th:href="@{/css/estilos-tabla.css}" />
<link rel="stylesheet" th:href="@{/css/formulario.css}" />


</head>
<body>

<div class="container" style="margin-top:30px; margin-bottom:100px;">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="cdr-formulario">
                
                <h3>Detalle de Cliente</h3>
                <hr>
                
                <p><strong>DNI:</strong> <span th:text="${dataCliente?.dni}"></span></p>
                <p><strong>Nombre:</strong> <span th:text="${dataCliente?.nombreCliente}"></span></p>
                <p><strong>Apellido:</strong> <span th:text="${dataCliente?.apellidoCliente}"></span></p>
                <p><strong>Teléfono:</strong> <span th:text="${dataCliente?.telefono}"></span></p>
                <p><strong>Dirección:</strong> <span th:text="${dataCliente?.direccion}"></span></p>
                <p><strong>Correo:</strong> <span th:text="${dataCliente?.correo}"></span></p>
                
                <hr>
                
                <div class="d-flex justify-content-end">
                    <a href="javascript:history.back()" class="crd-btn crd-btn-nuevo">
                        Regresar
                    </a>
                </div>
                
            </div>
        </div>
    </div>
</div>

</body>
</html>
