<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tipo Servicio</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
            <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
                <h4>Formulario de Registro de Tipo Servicio</h4>
                <hr>
                
                <form th:action="@{/ServletTipoServicio}" method="post">
                    <input type="hidden" name="type" value="registrar">
                    
                    <div class="form-group row">
                        <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Descripción</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="text" name="txtDescripcion" style="width: 100%">
                        </div>
                    </div>
                    
                    <div class="form-group row">
                        <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Precio</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="number" step="0.01" name="txtPrecio" style="width: 100%">
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="form-group row">
                        <div class="col-lg-3 col-md-3 col-sm-3">
                            <input type="submit" class="btn btn-success" value="Registrar">
                        </div>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <a th:href="@{/ServletTipoServicio(type='listar')}" class="btn btn-primary">Regresar</a>
                        </div>
                    </div>
                </form>
                <br>
            </div>
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
        </div>
    </div>
</body>
</html>
