<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Tipo Servicio</title>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-lg-3 col-md-3 col-sm-3"></div>
        <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
            <h4>Formulario de Actualización de Tipo Servicio</h4>
            <hr>
            
            <form th:action="@{/tiposServicio/registrar}" th:object="${tipoServicioDataEdit}" method="post">
                <input type="hidden" name="type" value="editar">
                
                <input type="hidden" th:field="*{idTipoServicio}">
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Descripción</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" th:field="*{descripcion}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Precio</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="number" step="0.01" th:field="*{precio}" style="width: 100%">
                    </div>
                </div><br>
                
                <div class="col-6 col-sm-7">
                    <input type="submit" class="btn btn-primary" value="Editar servicio">
                    <a th:href="@{/tiposServicio/lista}" class="btn btn-primary">Regresar</a>
                </div>
            </form>
            
        </div>
    </div>
</div>
</body>
</html>
