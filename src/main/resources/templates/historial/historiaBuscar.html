<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial Clínico</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
            <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
                <h4>Buscar Historial Clínico de Mascota</h4>
                <hr>
                
                <form th:action="@{/ServletHistorial}" method="post">
                    <input type="hidden" name="type" value="verHistorial">
                    
                    <div class="form-group row">
                        <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">ID Mascota</label>
                        <div class="col-lg-9 col-md-9 col-sm-9">
                            <input type="number" name="idMascota" style="width: 100%" 
                                   placeholder="Ingrese el ID de la mascota">
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="form-group row">
                        <div class="col-lg-12 col-md-12 col-sm-12">
                            <input type="submit" class="btn btn-primary" value="Buscar Historial">
                        </div>
                    </div>
                </form>
                
                <div class="alert alert-info mt-3">
                    <strong>Nota:</strong> Ingrese el ID de la mascota para ver su historial clínico completo.
                </div>
                <br>
            </div>
            <div class="col-lg-3 col-md-3 col-sm-3"></div>
        </div>
    </div>
</body>
</html>
