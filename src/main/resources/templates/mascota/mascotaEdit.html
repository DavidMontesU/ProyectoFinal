<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Mascota</title>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-lg-3 col-md-3 col-sm-3"></div>
        <div class="col-lg-6 col-md-6 col-sm-6 cdr-formulario">
            <h4>Formulario de Actualización de Mascota</h4>
            <hr>
            
            <form th:action="@{/ServletMascota}" method="post">
                <input type="hidden" name="type" value="editar">
                
                <input type="hidden" name="idMascota" th:value="${mascotaDataEdit?.idMascota}">
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Nombre</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtNombre" 
                               th:value="${mascotaDataEdit?.nombreMascota}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Especie</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <select name="cboEspecie" style="width: 100%">
                            <option value="">Seleccione una especie</option>
                            <option th:each="item : ${dataEspecie}" 
                                    th:value="${item.idEspecie}" 
                                    th:text="${item.nombreEspecie}"
                                    th:selected="${mascotaDataEdit != null and item.idEspecie == mascotaDataEdit.idEspecie}">
                            </option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Raza</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="text" name="txtRaza" 
                               th:value="${mascotaDataEdit?.raza}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Edad</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="number" name="txtEdad" 
                               th:value="${mascotaDataEdit?.edad}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Peso</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <input type="number" step="0.01" name="txtPeso" 
                               th:value="${mascotaDataEdit?.peso}" style="width: 100%">
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Dueño</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <select name="cboCliente" style="width: 100%">
                            <option value="">Seleccione un dueño</option>
                            <option th:each="item : ${dataCliente}" 
                                    th:value="${item.idCliente}" 
                                    th:text="${item.nombreCliente + ' ' + item.apellidoCliente}"
                                    th:selected="${mascotaDataEdit != null and item.idCliente == mascotaDataEdit.idCliente}">
                            </option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group row">
                    <label class="col-lg-3 col-md-3 col-sm-3 col-form-label">Observaciones</label>
                    <div class="col-lg-9 col-md-9 col-sm-9">
                        <textarea name="txtObservaciones" rows="3" style="width: 100%" 
                                  th:text="${mascotaDataEdit?.observaciones}"></textarea>
                    </div>
                </div><br>
                
                <div class="col-6 col-sm-7">
                    <input type="submit" class="btn btn-primary" value="Editar mascota">
                    <a th:href="@{/ServletMascota(type='listar')}" class="btn btn-primary">Regresar</a>
                </div>
            </form>
            
        </div>
    </div>
</div>
</body>
</html>
